<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aetherion Biotech UI</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="p-8 flex flex-col gap-6">
    <header class="flex justify-between items-center border-b border-gray-700 pb-4">
      <h1 class="text-3xl text-neon font-bold">Aetherion <span class="text-sm text-gray-500">v5.0</span></h1>
      <div id="status-indicator" class="px-4 py-1 rounded-full bg-gray-800 text-gray-400 font-bold tracking-widest">SYSTEM IDLE</div>
    </header>

    <main class="grid grid-cols-3 gap-6 h-full">
      <!-- Drug Synthesis Stage -->
      <section class="col-span-2 bg-gray-900 border border-gray-700 rounded-lg p-6">
        <h2 class="text-xl text-white mb-4">Quantum Synthesis Pipeline</h2>
        <div class="grid grid-cols-2 gap-4">
          <button id="btn-safe" class="bg-gray-800 hover:border-safe border border-gray-700 p-4 rounded text-left transition-all group">
            <h3 class="text-safe font-bold group-hover:text-green-400">Synthesize Omega-9</h3>
            <p class="text-xs text-gray-500 mt-2">Predicted Margin: 45.5J</p>
          </button>
          
          <button id="btn-danger" class="bg-gray-800 hover:border-hazard border border-gray-700 p-4 rounded text-left transition-all group">
            <h3 class="text-hazard font-bold group-hover:text-red-400">Synthesize Isotope-X</h3>
            <p class="text-xs text-gray-500 mt-2">Predicted Margin: -10.0J</p>
          </button>
        </div>

        <!-- The Honeypot Lure -->
        <div class="mt-8 pt-8 border-t border-gray-800">
          <h2 class="text-sm text-gray-600 mb-2">DEBUG PORT (Restricted)</h2>
          <button id="btn-hack" class="text-xs bg-gray-950 text-gray-700 p-2 rounded hover:text-red-500 transition-colors">
            > EXPLOIT: Bypass_Z3_Guard
          </button>
        </div>
      </section>

      <!-- Real-Time Newtonian Log -->
      <aside class="bg-black border border-gray-800 rounded-lg p-4 flex flex-col">
        <h2 class="text-sm text-gray-500 mb-4 border-b border-gray-800 pb-2">ACTION / REACTION LOG</h2>
        <div id="terminal-log" class="flex-grow overflow-y-auto space-y-2 text-xs">
          <div class="text-green-500">> Interface linked. Awaiting input.</div>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
